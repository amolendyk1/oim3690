<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="converter-page">

  <!-- Striped Header -->
  <header class="striped-header">
    <h1>Temperature Converter</h1>
  </header>

  <!-- Centered Panel -->
  <main class="converter-center">
    <section class="panel converter">
      <div class="input-group">
          <label for="celsius-input">Celsius:</label>
          <input type="number" id="celsius-input" placeholder="Enter Celsius">
      </div>

      <div class="input-group">
          <label for="fahrenheit-input">Fahrenheit:</label>
          <input type="number" id="fahrenheit-input" placeholder="Enter Fahrenheit">
      </div>
    </section>
  </main>

  <!-- Striped Footer -->
  <footer class="footer-polkadots">
    <div class="footer-box"></div>
  </footer>

</body>
</html>
