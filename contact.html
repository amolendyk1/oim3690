<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Contact | Allison Molendyk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="contact-page">

  <header class="striped-header">
    <h1>Contact Me</h1>
  </header>

  <nav class="top-nav">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="about-me.html">About Me</a>
    <a class="nav-link" href="about.html">About</a>
    <a class="nav-link" href="hello.html">My First Page</a>
  </nav>

  <main class="panel-wrapper">
    <section class="panel contact-panel">

      <h2>Get in Touch</h2>

      <form action="https://oim.zhili.dev/echo/view" method="POST">

        <div class="field">
          <label class="required" for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="field">
          <label class="required" for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 123‑4567">
        </div>

        <div class="field">
          <label class="required" for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>

        <button type="submit" class="pink-btn">Send Message</button>

      </form>

    </section>
  </main>

  <footer class="footer-polkadots">
    <div class="footer-box">
      <p>Contact: <a href="mailto:amolendyk1@babson.edu">amolendyk1@babson.edu</a></p>
    </div>
  </footer>

</body>
</html>
