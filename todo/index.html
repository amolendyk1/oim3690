<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple To-Do App</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body class="todo-page">

    <!-- STRIPED HEADER -->
    <header class="striped-header">
      <h1 class="todo-title">To-Do List</h1>
    </header>

    <!-- MAIN TO-DO BOX -->
    <main class="todo-wrapper">
      <div class="todo-container">

        <div class="input-group">
          <select id="category-select">
            <option value="work">Work</option>
            <option value="personal">Personal</option>
            <option value="shopping">Shopping</option>
          </select>

          <input type="text" id="todo-input" placeholder="Add a new task..." />
          <button id="add-btn" class="todo-btn">Add</button>
        </div>

        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="work">Work</button>
          <button class="filter-btn" data-filter="personal">Personal</button>
          <button class="filter-btn" data-filter="shopping">Shopping</button>
        </div>

        <ul id="todo-list"></ul>

      </div>
    </main>

    <!-- STRIPED FOOTER -->
    <footer class="footer-polkadots">
      <div class="footer-box">
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
