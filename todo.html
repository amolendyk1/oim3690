<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple To-Do App</title>
    <style>
      body {
        font-family: "Arial", sans-serif;
        background-color: #f5f7fa;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .todo-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 400px;
        max-width: 100%;
      }

      h1 {
        color: #2c3e50;
        text-align: center;
        margin-bottom: 20px;
      }

      .input-group {
        display: flex;
        margin-bottom: 20px;
      }

      #todo-input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px 0 0 5px;
        font-size: 16px;
      }

      #add-btn {
        padding: 10px 20px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 0 5px 5px 0;
        cursor: pointer;
        font-size: 16px;
      }

      #add-btn:hover {
        background-color: #2980b9;
      }

      #todo-list {
        list-style: none;
        padding: 0;
      }

      #todo-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
      }

      #todo-list li.completed {
        text-decoration: line-through;
        color: #95a5a6;
      }

      #todo-list li button {
        background-color: #e74c3c;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 3px;
        cursor: pointer;
      }

      #todo-list li button:hover {
        background-color: #c0392b;
      }
    </style>
  </head>
  <body>
    <div class="todo-container">
      <h1>To-Do List</h1>
      <div class="input-group">
        <input type="text" id="todo-input" placeholder="Add a new task..." />
        <button id="add-btn">Add</button>
      </div>
      <ul id="todo-list">
        <!-- Tasks will be added here -->
      </ul>
    </div>

    <script src="todo.js"></script>
  </body>
</html>
